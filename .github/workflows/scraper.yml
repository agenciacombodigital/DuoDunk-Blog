name: NBA News Scraper

on:
  schedule:
    # Horário de pico (07:00-23:00 horário de Brasília = 10:00-02:00 UTC)
    # A cada 5 minutos
    - cron: '*/5 10-23 * * *'
    - cron: '0,5,10,15,20,25 0-2 * * *'
    
    # Horário baixo (23:00-07:00 horário de Brasília = 02:00-10:00 UTC)
    # A cada 30 minutos
    - cron: '*/30 2-10 * * *'
    
    # Limpeza diária às 03:00 UTC (00:00 Brasília)
    - cron: '0 3 * * *'
  
  # Permite execução manual
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Não rodar na limpeza diária
    if: github.event.schedule != '0 3 * * *'
    
    steps:
      - name: 🤖 Chamar Edge Function Scraper
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://qruwcedwvylwldxtqoew.supabase.co/functions/v1/scrape-news" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}')
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          echo "Status: $http_code"
          echo "Response: $body"
          
          if [ "$http_code" -ne 200 ]; then
            echo "❌ Erro ao coletar notícias"
            exit 1
          fi
          
          echo "✅ Notícias coletadas com sucesso"

  cleanup:
    runs-on: ubuntu-latest
    # Apenas rodar às 03:00
    if: github.event.schedule == '0 3 * * *'
    
    steps:
      - name: 🧹 Limpar artigos antigos
        run: |
          curl -X POST \
            "https://qruwcedwvylwldxtqoew.supabase.co/rest/v1/rpc/cleanup_old_data" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json"
          
          echo "✅ Limpeza concluída"