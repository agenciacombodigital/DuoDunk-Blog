name: Gerar Post Consolidado NBA

on:
  schedule:
    - cron: '30 6 * * *' # Roda todo dia às 3h30 da manhã (horário de Brasília)
  workflow_dispatch:

jobs:
  gerar_post:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      
      - name: Instalar dependências
        run: npm install
      
      - name: Executar script de geração e publicação
        env:
          SUPABASE_URL: https://brerfpcfkyptkzygyzxl.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node scripts/gerarPostsResultados.js
