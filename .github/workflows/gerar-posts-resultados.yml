name: Gerar Post Consolidado NBA

on:
  schedule:
    - cron: '0 5 * * *' # Roda todo dia às 5h da manhã (UTC)
  workflow_dispatch:

jobs:
  gerar_post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Executar script de geração de posts
        run: node scripts/gerarPostsResultados.js

      - name: Commit post gerado
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add content/posts/resultados-nba-*.md
          git commit -m "🤖 Auto: post NBA resultados" || true
          git push