name: Publicar Posts Resultados NBA Automaticamente

on:
  schedule:
    # Executa às 3h30 AM UTC (00h30 horário de Brasília)
    - cron: '30 3 * * *'
  
  # Permite execução manual via GitHub UI
  workflow_dispatch:

jobs:
  publicar-posts:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Fazer checkout do código
        uses: actions/checkout@v4

      - name: 📄 Ler arquivo Markdown mais recente
        id: read_markdown
        run: |
          # Encontrar o arquivo mais recente em content/posts que começa com "resultados-nba-"
          LATEST_FILE=$(ls -t content/posts/resultados-nba-*.md 2>/dev/null | head -n 1)
          
          if [ -z "$LATEST_FILE" ]; then
            echo "❌ Nenhum arquivo de resultados encontrado!"
            exit 1
          fi
          
          echo "📄 Arquivo encontrado: $LATEST_FILE"
          
          # Ler o conteúdo do arquivo
          CONTENT=$(cat "$LATEST_FILE")
          
          # Salvar em variável de ambiente (escapando quebras de linha)
          echo "MARKDOWN_CONTENT<<EOF" >> $GITHUB_ENV
          echo "$CONTENT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          # Salvar nome do arquivo
          FILENAME=$(basename "$LATEST_FILE")
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV
          
          echo "✅ Conteúdo lido com sucesso!"

      - name: 🚀 Publicar no Supabase via Edge Function
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/publish-markdown-post" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -d @- <<EOF
          {
            "content": $(echo "$MARKDOWN_CONTENT" | jq -Rs .),
            "filename": "$FILENAME"
          }
          EOF
          )
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "📊 Status HTTP: $HTTP_CODE"
          echo "📄 Resposta: $BODY"
          
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Post publicado com sucesso!"
          else
            echo "❌ Erro ao publicar post!"
            exit 1
          fi

      - name: 🎉 Finalizado
        run: |
          echo "✅ Processo concluído!"
          echo "📅 Horário: $(date)"